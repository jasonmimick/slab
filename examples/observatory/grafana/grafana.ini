# realistic slab skin: dark, no login for the LAN demo, slab naming.
[server]
http_port = 3000
[users]
default_theme = dark
[auth.anonymous]
enabled = true
org_role = Admin
[auth]
disable_login_form = true
[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/slab-rack.json
[analytics]
reporting_enabled = false
check_for_updates = false
